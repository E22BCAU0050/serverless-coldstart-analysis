          def handler(event, context):
              table  = dynamodb.Table(os.environ['BOOKS_TABLE'])
              action = event.get('action', 'seed')
              TAGS   = ['bestseller','award-winner','classic','recommended','new-arrival']

              if action == 'clear':
                  scan = table.scan(ProjectionExpression='bookId')
                  with table.batch_writer() as b:
                      for item in scan['Items']:
                          b.delete_item(Key={'bookId': item['bookId']})
                  return {'message': f"Cleared {len(scan['Items'])} records"}

              with table.batch_writer() as b:
                  for book in BOOKS:
                      b.put_item(Item={
                          **book,
                          'bookId':    str(uuid.uuid4()),
                          'createdAt': datetime.now(timezone.utc).isoformat(),
                          'tags':      random.sample(TAGS, k=2)
                      })
              return {'message': f'Seeded {len(BOOKS)} books', 'status': 'success'}
      Tags:
        - Key: Project
          Value: coldstart-research

# ============================================================
# API GATEWAY
# ============================================================

  ResearchApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: coldstart-research-api
      Description: Book Inventory API — Cold Start Research (873166938412 / us-east-1)
      EndpointConfiguration:
        Types: [REGIONAL]

  # Resources
  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ResearchApi
      ParentId: !GetAtt ResearchApi.RootResourceId
      PathPart: health

  BooksResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ResearchApi
      ParentId: !GetAtt ResearchApi.RootResourceId
      PathPart: books

  BookIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ResearchApi
      ParentId: !Ref BooksResource
      PathPart: '{bookId}'

  # Methods — all routed to non-vpc function
  HealthGET:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResearchApi
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/${BookApiNonVpc.Arn}/invocations

  BooksGET:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResearchApi
      ResourceId: !Ref BooksResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/${BookApiNonVpc.Arn}/invocations

  BooksPOST:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResearchApi
      ResourceId: !Ref BooksResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/${BookApiNonVpc.Arn}/invocations

  BookGET:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResearchApi
      ResourceId: !Ref BookIdResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/${BookApiNonVpc.Arn}/invocations

  BookPUT:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResearchApi
      ResourceId: !Ref BookIdResource
      HttpMethod: PUT
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/${BookApiNonVpc.Arn}/invocations

  BookDELETE:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResearchApi
      ResourceId: !Ref BookIdResource
      HttpMethod: DELETE
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:us-east-1:lambda:path/2015-03-31/functions/${BookApiNonVpc.Arn}/invocations

  # Lambda invoke permissions
  PermNonVpc:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BookApiNonVpc
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:us-east-1:873166938412:${ResearchApi}/*/*

  PermVpc:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BookApiVpc
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:us-east-1:873166938412:${ResearchApi}/*/*

  PermProvisioned:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BookApiProvisioned
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:us-east-1:873166938412:${ResearchApi}/*/*

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - HealthGET
      - BooksGET
      - BooksPOST
      - BookGET
      - BookPUT
      - BookDELETE
    Properties:
      RestApiId: !Ref ResearchApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ResearchApi
      DeploymentId: !Ref ApiDeployment
      StageName: dev
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: false
          LoggingLevel: ERROR

