  # Versioning + alias required for Provisioned Concurrency
  ProvisionedVersion:
    Type: AWS::Lambda::Version
    Properties:
      FunctionName: !Ref BookApiProvisioned
      Description: v1 — provisioned concurrency target

  ProvisionedAlias:
    Type: AWS::Lambda::Alias
    Properties:
      FunctionName: !Ref BookApiProvisioned
      FunctionVersion: !GetAtt ProvisionedVersion.Version
      Name: live

  ProvisionedConcurrencyConfig:
    Type: AWS::Lambda::ProvisionedConcurrencyConfig
    Properties:
      FunctionName: !Ref BookApiProvisioned
      Qualifier: !GetAtt ProvisionedAlias.Name
      ProvisionedConcurrentExecutions: 2

  # ── Seeder Lambda ──
  DbSeeder:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupSeeder
    Properties:
      FunctionName: coldstart-research-seeder
      Description: Seeds DynamoDB with 20 book records for realistic API testing
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 256
      Timeout: 120
      Environment:
        Variables:
          BOOKS_TABLE: coldstart-research-books
      Code:
        ZipFile: |
          import os, uuid, boto3, random
          from datetime import datetime, timezone
          from decimal import Decimal

          dynamodb = boto3.resource('dynamodb')

          BOOKS = [
            {"title":"Clean Code","author":"Robert C. Martin","genre":"Technology","publishedYear":2008,"isbn":"978-0132350884","price":Decimal("35.99"),"stock":150,"rating":Decimal("4.7")},
            {"title":"The Pragmatic Programmer","author":"David Thomas","genre":"Technology","publishedYear":2019,"isbn":"978-0135957059","price":Decimal("49.95"),"stock":200,"rating":Decimal("4.8")},
            {"title":"Designing Data-Intensive Applications","author":"Martin Kleppmann","genre":"Technology","publishedYear":2017,"isbn":"978-1449373320","price":Decimal("55.00"),"stock":80,"rating":Decimal("4.9")},
            {"title":"System Design Interview","author":"Alex Xu","genre":"Technology","publishedYear":2020,"isbn":"979-8664653403","price":Decimal("35.99"),"stock":150,"rating":Decimal("4.7")},
