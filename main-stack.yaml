                  ["AWS/Lambda","InitDuration","FunctionName","coldstart-research-api-vpc",{"label":"VPC","color":"#d62728"}],
                  ["AWS/Lambda","InitDuration","FunctionName","coldstart-research-api-provisioned",{"label":"Provisioned","color":"#1f77b4"}]
                ],
                "period": 60, "stat": "Average", "view": "timeSeries", "region": "us-east-1"
              }
            },
            {
              "type": "metric", "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "p95 Duration — All Functions",
                "metrics": [
                  ["AWS/Lambda","Duration","FunctionName","coldstart-research-api-non-vpc",{"stat":"p95","label":"Non-VPC p95"}],
                  ["AWS/Lambda","Duration","FunctionName","coldstart-research-api-vpc",{"stat":"p95","label":"VPC p95"}],
                  ["AWS/Lambda","Duration","FunctionName","coldstart-research-api-provisioned",{"stat":"p95","label":"Provisioned p95"}]
                ],
                "period": 60, "view": "timeSeries", "region": "us-east-1"
              }
            },
            {
              "type": "metric", "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "p99 Duration — All Functions",
                "metrics": [
                  ["AWS/Lambda","Duration","FunctionName","coldstart-research-api-non-vpc",{"stat":"p99","label":"Non-VPC p99"}],
                  ["AWS/Lambda","Duration","FunctionName","coldstart-research-api-vpc",{"stat":"p99","label":"VPC p99"}],
                  ["AWS/Lambda","Duration","FunctionName","coldstart-research-api-provisioned",{"stat":"p99","label":"Provisioned p99"}]
                ],
                "period": 60, "view": "timeSeries", "region": "us-east-1"
              }
            },
            {
              "type": "metric", "x": 0, "y": 12, "width": 12, "height": 6,
              "properties": {
                "title": "Invocation Count",
                "metrics": [
                  ["AWS/Lambda","Invocations","FunctionName","coldstart-research-api-non-vpc"],
                  ["AWS/Lambda","Invocations","FunctionName","coldstart-research-api-vpc"],
                  ["AWS/Lambda","Invocations","FunctionName","coldstart-research-api-provisioned"]
                ],
                "period": 60, "stat": "Sum", "view": "timeSeries", "region": "us-east-1"
              }
            },
            {
              "type": "metric", "x": 12, "y": 12, "width": 12, "height": 6,
              "properties": {
                "title": "Errors",
                "metrics": [
                  ["AWS/Lambda","Errors","FunctionName","coldstart-research-api-non-vpc"],
                  ["AWS/Lambda","Errors","FunctionName","coldstart-research-api-vpc"],
                  ["AWS/Lambda","Errors","FunctionName","coldstart-research-api-provisioned"]
                ],
                "period": 60, "stat": "Sum", "view": "timeSeries", "region": "us-east-1"
              }
            }
          ]
        }

