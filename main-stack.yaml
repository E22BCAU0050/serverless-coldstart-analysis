AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Cold Start Latency Research — AWS Lambda
  Account: 873166938412 | Region: us-east-1 | Memory: 128MB
  Book Inventory API with 3 Lambda configs for cold start comparison.

# ============================================================
# PARAMETERS (pre-filled — no changes needed)
# ============================================================
Parameters:
  ProjectName:
    Type: String
    Default: coldstart-research

  Environment:
    Type: String
    Default: dev

# ============================================================
# VPC
# ============================================================
Resources:

  ResearchVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: coldstart-research-vpc
        - Key: Project
          Value: coldstart-research

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ResearchVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-east-1a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: coldstart-research-public-1

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ResearchVPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: us-east-1a
      Tags:
        - Key: Name
          Value: coldstart-research-private-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ResearchVPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: us-east-1b
      Tags:
        - Key: Name
          Value: coldstart-research-private-2

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: coldstart-research-igw

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref ResearchVPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ResearchVPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: coldstart-research-nat

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ResearchVPC

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # DynamoDB VPC Gateway Endpoint — FREE, no NAT cost for DynamoDB traffic
  DynamoDBVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref ResearchVPC
      ServiceName: com.amazonaws.us-east-1.dynamodb
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for VPC Lambda functions
      VpcId: !Ref ResearchVPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: coldstart-research-lambda-sg

# ============================================================
# DYNAMODB TABLES
# ============================================================

  BooksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: coldstart-research-books
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: bookId
          AttributeType: S
        - AttributeName: genre
          AttributeType: S
        - AttributeName: publishedYear
          AttributeType: N
      KeySchema:
        - AttributeName: bookId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: genre-publishedYear-index
          KeySchema:
            - AttributeName: genre
              KeyType: HASH
            - AttributeName: publishedYear
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: coldstart-research

  MetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: coldstart-research-metrics
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: requestId
          AttributeType: S
        - AttributeName: functionType
          AttributeType: S
      KeySchema:
        - AttributeName: requestId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: functionType-index
          KeySchema:
            - AttributeName: functionType
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: coldstart-research

# ============================================================
# IAM ROLE
# ============================================================

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: coldstart-research-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchWriteItem
                  - dynamodb:BatchGetItem
                Resource:
                  - !GetAtt BooksTable.Arn
                  - !Sub ${BooksTable.Arn}/index/*
                  - !GetAtt MetricsTable.Arn
                  - !Sub ${MetricsTable.Arn}/index/*
        - PolicyName: CloudWatchMetrics
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

# ============================================================
# LOG GROUPS (14-day retention to save cost)
# ============================================================

  LogGroupNonVpc:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/coldstart-research-api-non-vpc
      RetentionInDays: 14

  LogGroupVpc:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/coldstart-research-api-vpc
      RetentionInDays: 14

  LogGroupProvisioned:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/coldstart-research-api-provisioned
      RetentionInDays: 14

  LogGroupSeeder:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/coldstart-research-seeder
      RetentionInDays: 7

# ============================================================
# LAMBDA — SHARED FUNCTION CODE (inline)
# ============================================================

  # ── Function 1: Non-VPC (baseline, fastest cold start) ──
  BookApiNonVpc:
    Type: AWS::Lambda::Function
    DependsOn: LogGroupNonVpc
    Properties:
      FunctionName: coldstart-research-api-non-vpc
      Description: "RESEARCH: Non-VPC Lambda — baseline cold start measurement"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 128
      Timeout: 30
      Layers:
        - arn:aws:lambda:us-east-1:580247275435:layer:LambdaInsightsExtension:38
      Environment:
        Variables:
          BOOKS_TABLE: coldstart-research-books
          METRICS_TABLE: coldstart-research-metrics
          FUNCTION_TYPE: non-vpc
      Code:
        ZipFile: |
          import json, os, time, uuid, boto3
          from datetime import datetime, timezone
          from decimal import Decimal
          import boto3.dynamodb.conditions as C

          dynamodb   = boto3.resource('dynamodb')
          books_tbl  = dynamodb.Table(os.environ['BOOKS_TABLE'])
          metrics_tbl= dynamodb.Table(os.environ['METRICS_TABLE'])
          FTYPE      = os.environ.get('FUNCTION_TYPE', 'unknown')
          COLD       = True

          class Dec(json.JSONEncoder):
              def default(self, o):
                  return float(o) if isinstance(o, Decimal) else super().default(o)

          def save_metric(req_id, path, method, ms, cold):
              try:
                  metrics_tbl.put_item(Item={
                      'requestId':   req_id,
                      'functionType': FTYPE,
                      'path': path, 'method': method,
                      'durationMs':  Decimal(str(round(ms, 2))),
                      'isColdStart': cold,
                      'memoryMB':    int(os.environ.get('AWS_LAMBDA_FUNCTION_MEMORY_SIZE', 128)),
                      'timestamp':   datetime.now(timezone.utc).isoformat(),
                      'ttl':         int(time.time()) + 2592000
                  })
              except Exception as e:
                  print(f'[metric_err] {e}')

          def resp(code, body, cold, ms):
              return {
                  'statusCode': code,
                  'headers': {
                      'Content-Type':    'application/json',
                      'X-Cold-Start':    str(cold),
                      'X-Function-Type': FTYPE,
                      'X-Duration-Ms':   str(round(ms, 2))
                  },
                  'body': json.dumps(body, cls=Dec)
              }

          def handler(event, context):
              global COLD
              t0    = time.time()
              cold  = COLD
              COLD  = False
              path  = event.get('path', '/')
              meth  = event.get('httpMethod', 'GET')
              pp    = event.get('pathParameters') or {}
              qs    = event.get('queryStringParameters') or {}
              body  = {}
              if event.get('body'):
                  try: body = json.loads(event['body'])
                  except: pass
              try:
                  if path == '/health':
                      r, c = {'status':'ok','fn':FTYPE,'cold':cold}, 200
                  elif path == '/books' and meth == 'GET':
                      g = qs.get('genre')
                      if g:
                          res = books_tbl.query(IndexName='genre-publishedYear-index',
                                                KeyConditionExpression=C.Key('genre').eq(g))
                      else:
                          res = books_tbl.scan(Limit=20)
                      r, c = {'books': res['Items'], 'count': len(res['Items'])}, 200
                  elif path == '/books' and meth == 'POST':
                      bid = str(uuid.uuid4())
                      item = {**body, 'bookId': bid, 'createdAt': datetime.now(timezone.utc).isoformat()}
                      if 'publishedYear' in item: item['publishedYear'] = int(item['publishedYear'])
                      books_tbl.put_item(Item=item)
                      r, c = {'bookId': bid, 'message': 'created'}, 201
                  elif path.startswith('/books/') and meth == 'GET':
                      bid = pp.get('bookId', path.split('/')[-1])
                      res = books_tbl.get_item(Key={'bookId': bid})
                      r, c = (res['Item'], 200) if 'Item' in res else ({'error':'not found'}, 404)
                  elif path.startswith('/books/') and meth == 'PUT':
                      bid  = pp.get('bookId', path.split('/')[-1])
                      upd  = {k:v for k,v in body.items() if k != 'bookId'}
                      if upd:
                          expr  = 'SET ' + ', '.join(f'#k{i}=:v{i}' for i in range(len(upd)))
                          names = {f'#k{i}':k for i,k in enumerate(upd)}
                          vals  = {f':v{i}':v for i,v in enumerate(upd.values())}
                          books_tbl.update_item(Key={'bookId':bid},
                              UpdateExpression=expr,
                              ExpressionAttributeNames=names,
                              ExpressionAttributeValues=vals)
                          r, c = {'message':'updated','bookId':bid}, 200
                      else:
                          r, c = {'error':'nothing to update'}, 400
                  elif path.startswith('/books/') and meth == 'DELETE':
                      bid = pp.get('bookId', path.split('/')[-1])
                      books_tbl.delete_item(Key={'bookId': bid})
                      r, c = {'message':'deleted'}, 200
                  else:
                      r, c = {'error':'not found','path':path,'method':meth}, 404
              except Exception as e:
                  r, c = {'error': str(e)}, 500
              ms = (time.time() - t0) * 1000
              save_metric(context.aws_request_id, path, meth, ms, cold)
              return resp(c, r, cold, ms)
      Tags:
        - Key: Project
          Value: coldstart-research
        - Key: ColdStartVariant
          Value: non-vpc

  # ── Function 2: VPC Lambda (higher cold start — ENI provisioning) ──
