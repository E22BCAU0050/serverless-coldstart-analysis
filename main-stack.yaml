          ]

          def handler(event, context):
              table = dynamodb.Table(os.environ['BOOKS_TABLE'])
              action = event.get('action', 'seed')

              if action == 'clear':
                  scan = table.scan(ProjectionExpression='bookId')
                  deleted = 0
                  with table.batch_writer() as batch:
                      for item in scan['Items']:
                          batch.delete_item(Key={'bookId': item['bookId']})
                          deleted += 1
                  return {'message': f'Cleared {deleted} records'}

              if action == 'seed' or action == 'reseed':
                  inserted = 0
                  with table.batch_writer() as batch:
                      for book in SAMPLE_BOOKS:
                          item = {
                              **book,
                              'bookId': str(uuid.uuid4()),
                              'createdAt': datetime.now(timezone.utc).isoformat(),
                              'tags': random.sample(['bestseller', 'award-winner', 'classic', 'recommended', 'new-arrival'], k=2)
                          }
                          batch.put_item(Item=item)
                          inserted += 1
                  return {'message': f'Seeded {inserted} books', 'status': 'success'}

              return {'error': 'Unknown action. Use: seed, reseed, clear'}
      Tags:
        - Key: Project
          Value: !Ref ProjectName

# ============================================================
# API GATEWAY
# ============================================================

  ResearchApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub ${ProjectName}-api
      Description: Book Inventory API for Cold Start Research
      EndpointConfiguration:
        Types: [REGIONAL]
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # /health resource
  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ResearchApi
      ParentId: !GetAtt ResearchApi.RootResourceId
      PathPart: health

  # /books resource
  BooksResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ResearchApi
      ParentId: !GetAtt ResearchApi.RootResourceId
      PathPart: books

  # /books/{bookId}
  BookIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ResearchApi
      ParentId: !Ref BooksResource
      PathPart: '{bookId}'

  # --- Methods for Non-VPC ---
  HealthGetNonVpc:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResearchApi
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BookApiNonVpc.Arn}/invocations

  BooksGetNonVpc:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResearchApi
      ResourceId: !Ref BooksResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BookApiNonVpc.Arn}/invocations

  BooksPostNonVpc:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResearchApi
      ResourceId: !Ref BooksResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BookApiNonVpc.Arn}/invocations

  BookGetNonVpc:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResearchApi
      ResourceId: !Ref BookIdResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BookApiNonVpc.Arn}/invocations

  BookPutNonVpc:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResearchApi
      ResourceId: !Ref BookIdResource
      HttpMethod: PUT
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BookApiNonVpc.Arn}/invocations

  BookDeleteNonVpc:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResearchApi
      ResourceId: !Ref BookIdResource
      HttpMethod: DELETE
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${BookApiNonVpc.Arn}/invocations

  # Lambda permissions for API Gateway
  LambdaPermissionNonVpcHealth:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BookApiNonVpc
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ResearchApi}/*/*

  LambdaPermissionVpc:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BookApiVpc
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ResearchApi}/*/*

  LambdaPermissionProvisioned:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BookApiProvisioned
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ResearchApi}/*/*

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - HealthGetNonVpc
      - BooksGetNonVpc
      - BooksPostNonVpc
      - BookGetNonVpc
      - BookPutNonVpc
      - BookDeleteNonVpc
    Properties:
      RestApiId: !Ref ResearchApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ResearchApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          DataTraceEnabled: false  # Disable for cost savings
          LoggingLevel: ERROR
      Tags:
        - Key: Project
          Value: !Ref ProjectName

# ============================================================
# CLOUDWATCH DASHBOARD
# ============================================================

  ResearchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${ProjectName}-cold-start-dashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "title": "Init Duration (Cold Start) - All Functions",
                "metrics": [
                  ["AWS/Lambda", "InitDuration", "FunctionName", "${ProjectName}-api-non-vpc", {"label": "Non-VPC"}],
                  ["AWS/Lambda", "InitDuration", "FunctionName", "${ProjectName}-api-vpc", {"label": "VPC"}],
                  ["AWS/Lambda", "InitDuration", "FunctionName", "${ProjectName}-api-provisioned", {"label": "Provisioned"}]
                ],
                "period": 60,
                "stat": "Average",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "properties": {
                "title": "Duration (p99) - All Functions",
                "metrics": [
                  ["AWS/Lambda", "Duration", "FunctionName", "${ProjectName}-api-non-vpc", {"stat": "p99", "label": "Non-VPC p99"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "${ProjectName}-api-vpc", {"stat": "p99", "label": "VPC p99"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "${ProjectName}-api-provisioned", {"stat": "p99", "label": "Provisioned p99"}]
                ],
                "period": 60,
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "properties": {
                "title": "Invocation Count",
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${ProjectName}-api-non-vpc"],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${ProjectName}-api-vpc"],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${ProjectName}-api-provisioned"]
                ],
                "period": 60,
                "stat": "Sum",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "properties": {
                "title": "Error Rate",
                "metrics": [
                  ["AWS/Lambda", "Errors", "FunctionName", "${ProjectName}-api-non-vpc"],
                  ["AWS/Lambda", "Errors", "FunctionName", "${ProjectName}-api-vpc"],
                  ["AWS/Lambda", "Errors", "FunctionName", "${ProjectName}-api-provisioned"]
                ],
                "period": 60,
                "stat": "Sum",
                "view": "timeSeries"
              }
            }
          ]
        }

# ============================================================
# OUTPUTS
# ============================================================

Outputs:
  ApiBaseUrl:
    Description: Base URL for the research API
    Value: !Sub https://${ResearchApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${ProjectName}-api-url

  NonVpcFunctionArn:
    Description: ARN of Non-VPC Lambda function
    Value: !GetAtt BookApiNonVpc.Arn

  VpcFunctionArn:
    Description: ARN of VPC Lambda function
    Value: !GetAtt BookApiVpc.Arn

  ProvisionedFunctionArn:
    Description: ARN of Provisioned Concurrency Lambda function
    Value: !GetAtt BookApiProvisioned.Arn

  BooksTableName:
    Description: DynamoDB Books table name
    Value: !Ref BooksTable

  MetricsTableName:
    Description: DynamoDB Metrics table name (stores cold start telemetry)
    Value: !Ref MetricsTable

  SeederFunctionName:
    Description: Seeder Lambda function name
    Value: !Ref DbSeeder

  CloudWatchDashboard:
    Description: CloudWatch Dashboard URL
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${ProjectName}-cold-start-dashboard
