  SeederFunctionName:
    Value: coldstart-research-seeder

  NonVpcFunctionName:
    Value: coldstart-research-api-non-vpc

  VpcFunctionName:
    Value: coldstart-research-api-vpc

  ProvisionedFunctionName:
    Value: coldstart-research-api-provisioned

  DashboardUrl:
    Description: "CloudWatch Dashboard — open this in your browser"
    Value: https://us-east-1.console.aws.amazon.com/cloudwatch/home?region=us-east-1#dashboards:name=coldstart-research-dashboard
